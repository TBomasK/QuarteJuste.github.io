<!DOCTYPE html>

<html>
    
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/tableau.css">
    <link rel="stylesheet" href="css/clavier.css">
    
    <style>
           *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }
    /* Change la couleure de l'arière plan*/
    body{
      background:#111;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      overflow:hidden;

/*Change Le positionement du piano pour permettre un piano plus courant(clé blanc)*/
    .piano{
      position:relative;
      display:flex;
    }
/*Change la couleure des clé*/
    .Touche-blanche{
      width:80px;
      height:320px;
      background:white;
      border:2px solid #000;
      border-radius:0 0 10px 10px;
      cursor:pointer;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:15px;
      color:black;
      font-weight:bold;
      transition:0.1s;
      user-select:none;
    }
/*Change la couleur quand elle est appuiyer par la souris*/
    .Touche-blanche.active{
      background:#ddd;
      transform:translateY(4px);
    }
/*Change la couleure des clé*/
    .Touche-noir{
      position:absolute;
      width:50px;
      height:200px;
      background:black;
      border-radius:0 0 8px 8px;
      z-index:2;
      cursor:pointer;
      color:white;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      padding-bottom:10px;
      font-size:12px;
      user-select:none;
      transition:0.1s;
    }
/*Change la couleur quand elle est appuiyer par la souris*/
    .Touche-noir.active{
      background:#444;
      transform:translateY(4px);
    }

    /*Change Le positionement du piano pour permettre un piano plus courant (clé noir)*/
    .c-sharp{ left:55px; }
    .d-sharp{ left:135px; }
    .f-sharp{ left:295px; }
    .g-sharp{ left:375px; }
    .a-sharp{ left:455px; }
/*Tout ce qui se trouve à l'intérieur des accolades { ... } devient prioritaire uniquement si l'écran est petit.*/
    @media(max-width:800px){
      .Touche-blanche{
        width:50px;
        height:220px;
        font-size:12px;
      }

      .Touche-noir{
        width:32px;
        height:130px;
        font-size:10px;
      }

      .c-sharp{ left:34px; }
      .d-sharp{ left:84px; }
      .f-sharp{ left:184px; }
      .g-sharp{ left:234px; }
      .a-sharp{ left:284px; }
    }
  
    /* Fin de CSS Inspirer de https://www.youtube.com/watch?v=Mv1ZYpo8q4g et information partiellement modifier de https://www.codingnepalweb.com/playable-piano-html-css-javascript/ */
    </style>
</head>

<body>
    
    <table border="1">
  <tr>
    <td>INSTRUCTIONS</td>
    <td>
        <div id="divtitre">
            
        </div>
    </td>
    <td>RÈGLES / ABOUT</td>
  </tr>
  <tr>
    <td>MESSAGE D'ERREUR</td>
    <td>FLAT</td>
    <td>FLAT</td>
  </tr>
  
  <tr>
    <td>CHOIX + RADIO + SOUMISSION</td>
    <td colspan="2">

  <div class="piano">

    <!-- Touche blanche -->
    <div class="Touche-blanche" data-note="Do" data-key="a">Do</div>
    <div class="Touche-blanche" data-note="Ré" data-key="s">Ré</div>
    <div class="Touche-blanche" data-note="Mi" data-key="d">Mi</div>
    <div class="Touche-blanche" data-note="Fa" data-key="f">Fa</div>
    <div class="Touche-blanche" data-note="Sol" data-key="g">Sol</div>
    <div class="Touche-blanche" data-note="La" data-key="h">La</div>
    <div class="Touche-blanche" data-note="Si" data-key="j">Si</div>
    <div class="Touche-blanche" data-note="Do2" data-key="k">Do</div>

    <!-- Touche Noir -->
    <div class="Touche-noir c-sharp" data-note="Do#" data-key="w">Do#</div>
    <div class="Touche-noir d-sharp" data-note="Ré#" data-key="e">Ré#</div>
    <div class="Touche-noir f-sharp" data-note="Fa#" data-key="t">Fa#</div>
    <div class="Touche-noir g-sharp" data-note="Sol#" data-key="y">Sol#</div>
    <div class="Touche-noir a-sharp" data-note="La#" data-key="u">La#</div>

  </div>
    <!-- bouton pour soumettre le formulaire -->
    <input type="button" id="btnSoumet" onclick="confirmeInscription()"  value="Soumettre le formulaire">
    <!-- Création d'une section pour l'affichage des résultats -->
    <div id="divAffiche">
    </div>

<!--Débute la partie Javascript-->
      <script>
     //Modèle de compatibilité JavaScript utilisé pour initialiser l'API Web Audio sur différents navigateurs
    let AudioContext = window.AudioContext || window.webkitAudioContext;
    //permet de Jouer avec L'API Web Audio
    let audioCtx = new AudioContext();

//Détermine les fréquence pour produire la bonne note lorsqu'on appuis sur la clé
  let frequencies = {
    "Do": 261.63,
    "Do#": 277.18,
    "Ré": 293.66,
    "Ré#": 311.13,
    "Mi": 329.63,
    "Fa": 349.23,
    "Fa#": 369.99,
    "Sol": 392.00,
    "Sol#": 415.30,
    "La": 440.00,
    "La#": 466.16,
    "Si": 493.88,
    "Do2": 523.26,
  };

// création d'une fonction qui permet a jouer la bonne fréquence pour produire un beau son universelle
  function JoueNote(note, value){
      //Détermine la fréquence avec une Oscillateure
    let frequence = audioCtx.createOscillator();
    //Trouve la note a jouer
    let gainNode = audioCtx.createGain();
//Joue le typue de son parmis les celle offert par Javascript
    frequence.type = "sine";
    //Trouve la valeure de la fréquence a jouer
    frequence.frequency.value = frequencies[note];
//cherche la note
    frequence.connect(gainNode);
    gainNode.connect(audioCtx.destination);
//permet un son plus ron et court
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    //Détertmine la longuer de la note jouer
    gainNode.gain.exponentialRampToValueAtTime(
      0.001,
      audioCtx.currentTime + 1
    );

//Assure que quand nous appuiyon sur la note nous avons une note jouer
    frequence.start();
    frequence.stop(audioCtx.currentTime + 1);

//Chereche la valeure de la note appuiyer
    value.classList.add("active");

//Fait ensorte que la note ne reste pas appuiyer pour toujour et permet a être appuyer
    setTimeout(() => {
      value.classList.remove("active");
    }, 100);
  }

//Cherche la quelle des touche a été choisit
  let keys = document.querySelectorAll(".Touche-blanche, .Touche-noir");
  
  let derniereNote = "";
  //Ajoute un effect click a notre code
  keys.forEach(key => {
  key.addEventListener("click", () => {
    JoueNote(key.dataset.note, key);

    // Sauvegarde la dernière note jouée
    derniereNote = key.dataset.note;
  });
});

  // Code pour Le randomizer pour le titre et le reste
  let choix = 0
  
  while((choix < 1)||(choix > 2)){
        choix = (Math.random()*10).toFixed()
  }
let titre = ""

if(choix == 1){
    titre = "À vous dirais-je maman"
}else{
    if(choix == 2){
        titre = "Frère Jacques"
    }

    
}
    function confirmeInscription() {
                let affiche = document.getElementById("divAffiche");
                //Chercher les données dans le formulaire
                let affichetitre = document.getElementById("divtitre")
                let message = derniereNote + choix + titre
                //Afficher le message sur la page web
                affiche.innerHTML = message;
                affichetitre.innerHTML = titre;
            }
  
  
</script>
<!-- Fin du javascript -->
    
    </td>
    
  </tr>
</table>
    
</body>

</html>
