    <style>
           *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }
    /* Change la couleure de l'arière plan*/
    body{
      background:#111;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      overflow:hidden;

/*Change Le positionement du piano pour permettre un piano plus courant(clé blanc)*/
    .piano{
      position:relative;
      display:flex;
    }
/*Change la couleure des clé*/
    .Touche-blanche{
      width:80px;
      height:320px;
      background:white;
      border:2px solid #000;
      border-radius:0 0 10px 10px;
      cursor:pointer;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:15px;
      color:black;
      font-weight:bold;
      transition:0.1s;
      user-select:none;
    }
/*Change la couleur quand elle est appuiyer par la souris*/
    .Touche-blanche.active{
      background:#ddd;
      transform:translateY(4px);
    }
/*Change la couleure des clé*/
    .Touche-noir{
      position:absolute;
      width:50px;
      height:200px;
      background:black;
      border-radius:0 0 8px 8px;
      z-index:2;
      cursor:pointer;
      color:white;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      padding-bottom:10px;
      font-size:12px;
      user-select:none;
      transition:0.1s;
    }
/*Change la couleur quand elle est appuiyer par la souris*/
    .Touche-noir.active{
      background:#444;
      transform:translateY(4px);
    }

    /*Change Le positionement du piano pour permettre un piano plus courant (clé noir)*/
    .c-sharp{ left:55px; }
    .d-sharp{ left:135px; }
    .f-sharp{ left:295px; }
    .g-sharp{ left:375px; }
    .a-sharp{ left:455px; }
/*Tout ce qui se trouve à l'intérieur des accolades { ... } devient prioritaire uniquement si l'écran est petit.*/
    @media(max-width:800px){
      .Touche-blanche{
        width:50px;
        height:220px;
        font-size:12px;
      }

      .Touche-noir{
        width:32px;
        height:130px;
        font-size:10px;
      }

      .c-sharp{ left:34px; }
      .d-sharp{ left:84px; }
      .f-sharp{ left:184px; }
      .g-sharp{ left:234px; }
      .a-sharp{ left:284px; }
    }

      <script>
     //Modèle de compatibilité JavaScript utilisé pour initialiser l'API Web Audio sur différents navigateurs
    let AudioContext = window.AudioContext || window.webkitAudioContext;
    //permet de Jouer avec L'API Web Audio
    let audioCtx = new AudioContext();

//Détermine les fréquence pour produire la bonne note lorsqu'on appuis sur la clé
  let frequencies = {
    "Do": 261.63,
    "Do#": 277.18,
    "Ré": 293.66,
    "Ré#": 311.13,
    "Mi": 329.63,
    "Fa": 349.23,
    "Fa#": 369.99,
    "Sol": 392.00,
    "Sol#": 415.30,
    "La": 440.00,
    "La#": 466.16,
    "Si": 493.88,
    "Do2": 523.26,
  };

// création d'une fonction qui permet a jouer la bonne fréquence pour produire un beau son universelle
  function JoueNote(note, value){
      //Détermine la fréquence avec une Oscillateure
    let frequence = audioCtx.createOscillator();
    //Trouve la note a jouer
    let gainNode = audioCtx.createGain();
//Joue le typue de son parmis les celle offert par Javascript
    frequence.type = "sine";
    //Trouve la valeure de la fréquence a jouer
    frequence.frequency.value = frequencies[note];
//cherche la note
    frequence.connect(gainNode);
    gainNode.connect(audioCtx.destination);
//permet un son plus ron et court
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    //Détertmine la longuer de la note jouer
    gainNode.gain.exponentialRampToValueAtTime(
      0.001,
      audioCtx.currentTime + 1
    );

//Assure que quand nous appuiyon sur la note nous avons une note jouer
    frequence.start();
    frequence.stop(audioCtx.currentTime + 1);

//Chereche la valeure de la note appuiyer
    value.classList.add("active");

//Fait ensorte que la note ne reste pas appuiyer pour toujour et permet a être appuyer
    setTimeout(() => {
      value.classList.remove("active");
    }, 100);
  }

//Cherche la quelle des touche a été choisit
let keys = document.querySelectorAll(".Touche-blanche, .Touche-noir");
//détermine nos variable
let derniereNote = "";
let counter = 0;
let tblNotes = [];
let erreur = 0;
let choix = 0

// CLICK SYSTEM
keys.forEach(key => {
  key.addEventListener("click", () => {

    JoueNote(key.dataset.note, key);

    derniereNote = key.dataset.note;

  });
});
  
  //rend la pieces au hazard
  while((choix < 1)||(choix > 2)){

  }

//détermine la titre et quelle séquence

// Crée un changement au code au hazard

}else{
// crée un changmenet au code au hazard

                            "Instruction : " + tblNotes[0]
}

}

//Ajoute le titre
document.getElementById("divtitre").innerHTML = titre;
//Ajoute une base de 0 erreur
document.getElementById("messageErreur").innerHTML =
            "Nombre d'erreurs : " + 0;

//Fonction qui fait fonctioner le code quand tu appuis sur le bouton soumetre
    function confirmeInscription() {
            
            if(séquence == 1){
                //Assure quelle recomense après 8 essey
                if(counter == 8){
                        //Ajoute un instruction de base                        
    document.getElementById("divInstruction").innerHTML =
                            "Instruction : " + tblNotes[0]
                    counter = -1

                //Assure que nous avons la bonne séquence d'image et d'instruction
                switch (counter + 1){

                    case 2 :

                        document.getElementById("divInstruction").innerHTML =

                    case 3 :

                    case 4 :

                        document.getElementById("divInstruction").innerHTML =
                            "Fini"                          
                            break;
                        
                }
            }else{
                //Assure quelle recomense après 8 essey
                    if(séquence == 2){
                        if(counter == 8){
                                //Ajoute un instruction de base                        
    document.getElementById("divInstruction").innerHTML =
                            "Instruction : " + tblNotes[0]
                        counter = -1
                        erreur = 0
                    }
                     //assure que nous avons la bonne séquence d'image et d'instruction

                    case 4 :

                            "<img src='images/fj/fj_5.png' height='250'>";
                            
                        document.getElementById("divInstruction").innerHTML =
                            "Instruction : " + tblNotes[counter + 1]                            
                            break;
                    case 5 :
                        document.getElementById("divflat").innerHTML =
                            "<img src='images/fj/fj_6.png' height='250'>";
                            
                        document.getElementById("divInstruction").innerHTML =
                            "Instruction : " + tblNotes[counter + 1]                            
                            break;
                    case 6 :
                        document.getElementById("divflat").innerHTML =
                            "<img src='images/fj/fj_complet.png' height='250'>";
                            
                        document.getElementById("divInstruction").innerHTML =
                            "Fini"                          
                            break;
                        
                }
            }
            }
        // Code pour le message d'erreure
            if(tblNotes[counter] != derniereNote){
              erreur++;
            }
        //assure d'augmenter le compteur a chaque click
          counter++
        //Affiche le nombre d'erreure
          document.getElementById("messageErreur").innerHTML =
            "Nombre d'erreurs : " + erreur;
}
  
  
</script>
